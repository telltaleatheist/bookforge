<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BookForge Bookshelf</title>
  <link rel="stylesheet" href="library.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-title">
      <span class="logo">📚</span>
      <h1>BookForge Bookshelf</h1>
    </div>
    <div class="nav-controls">
      <div class="tab-toggle">
        <button class="tab-btn active" id="tab-audiobooks" data-tab="audiobooks">Audiobooks</button>
        <button class="tab-btn" id="tab-ebooks" data-tab="ebooks">Ebooks</button>
        <button class="tab-btn" id="tab-queue" data-tab="queue">Queue</button>
      </div>
      <span class="load-status" id="load-status"></span>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
        <span class="sun-icon">☀️</span>
        <span class="moon-icon">🌙</span>
      </button>
    </div>
  </nav>

  <div id="library-bar" class="stats-bar">
    <div class="stat">
      <span class="stat-value" id="total-books">0</span>
      <span class="stat-label" id="stat-label">Audiobooks</span>
    </div>
    <div class="sort-toggle">
      <button class="sort-btn active" id="sort-title">A-Z</button>
      <button class="sort-btn" id="sort-date">Recent</button>
    </div>
  </div>

  <div id="category-bar" class="category-bar" style="display: none;">
    <button class="category-pill active" data-category="all">All</button>
  </div>

  <div id="ebook-tag-bar" class="category-bar" style="display: none;"></div>

  <div id="search-container" class="search-container">
    <input type="text" class="search-box" id="search-box" placeholder="Search audiobooks...">
    <button class="clear-search" id="clear-search" style="display: none;">✕</button>
  </div>

  <main class="content">
    <!-- Library content (audiobooks + ebooks) -->
    <div id="library-content">
      <div id="loading-indicator" class="loading-indicator">
        <div class="spinner"></div>
        <span>Loading bookshelf...</span>
      </div>

      <div id="books-container" class="books-grid"></div>

      <div id="empty-state" class="empty-state" style="display: none;">
        <span class="empty-icon">📭</span>
        <p>No audiobooks found</p>
      </div>
    </div>

    <!-- Queue content -->
    <div id="queue-content" style="display: none;">
      <div id="queue-bar" class="stats-bar">
        <div class="queue-controls">
          <button id="queue-start-btn" class="queue-ctrl-btn queue-start" title="Start queue">
            <svg viewBox="0 0 24 24" width="18" height="18"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg>
          </button>
          <button id="queue-pause-btn" class="queue-ctrl-btn queue-pause" title="Pause queue" style="display:none;">
            <svg viewBox="0 0 24 24" width="18" height="18"><rect x="5" y="3" width="4" height="18" fill="currentColor"/><rect x="15" y="3" width="4" height="18" fill="currentColor"/></svg>
          </button>
        </div>
        <div class="stat">
          <span class="stat-value" id="queue-count">0</span>
          <span class="stat-label">Jobs</span>
        </div>
        <div class="queue-filter-toggle">
          <label class="queue-toggle-label">
            <input type="checkbox" id="queue-show-completed">
            <span>Show completed</span>
          </label>
        </div>
      </div>
      <div id="queue-jobs" class="queue-jobs"></div>
      <div id="queue-empty" class="empty-state" style="display: none;">
        <span class="empty-icon">📋</span>
        <p>No active jobs</p>
      </div>
    </div>
  </main>

  <!-- Audio player bar (hidden by default) -->
  <div id="player-bar" class="player-bar" style="display: none;">
    <div class="player-cover" id="player-cover"></div>
    <div class="player-info">
      <div class="player-title" id="player-title"></div>
      <div class="player-author" id="player-author"></div>
    </div>
    <button class="player-play-btn" id="player-play-btn" title="Play/Pause">
      <svg class="play-icon" viewBox="0 0 24 24" width="24" height="24"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg>
      <svg class="pause-icon" viewBox="0 0 24 24" width="24" height="24" style="display:none"><rect x="5" y="3" width="4" height="18" fill="currentColor"/><rect x="15" y="3" width="4" height="18" fill="currentColor"/></svg>
    </button>
    <div class="player-seek-group">
      <span class="player-time" id="player-current-time">0:00</span>
      <input type="range" class="player-seek" id="player-seek" min="0" max="100" value="0" step="0.1">
      <span class="player-time" id="player-duration">0:00</span>
    </div>
  </div>

  <audio id="audio-element" preload="auto"></audio>

  <script src="library.js"></script>
</body>
</html>
