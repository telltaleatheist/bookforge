<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BookForge Library</title>
  <link rel="stylesheet" href="library.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-title">
      <span class="logo">📚</span>
      <h1>BookForge Library</h1>
    </div>
    <div class="nav-controls">
      <div class="tab-toggle">
        <button class="tab-btn active" id="tab-audiobooks" data-tab="audiobooks">Audiobooks</button>
        <button class="tab-btn" id="tab-ebooks" data-tab="ebooks">Ebooks</button>
      </div>
      <span class="load-status" id="load-status"></span>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
        <span class="sun-icon">☀️</span>
        <span class="moon-icon">🌙</span>
      </button>
    </div>
  </nav>

  <div class="stats-bar">
    <div class="stat">
      <span class="stat-value" id="total-books">0</span>
      <span class="stat-label" id="stat-label">Audiobooks</span>
    </div>
    <div class="sort-toggle">
      <button class="sort-btn active" id="sort-title">A-Z</button>
      <button class="sort-btn" id="sort-date">Recent</button>
    </div>
  </div>

  <div id="category-bar" class="category-bar" style="display: none;">
    <button class="category-pill active" data-category="all">All</button>
  </div>

  <div class="search-container">
    <input type="text" class="search-box" id="search-box" placeholder="Search audiobooks...">
    <button class="clear-search" id="clear-search" style="display: none;">✕</button>
  </div>

  <main class="content">
    <div id="loading-indicator" class="loading-indicator">
      <div class="spinner"></div>
      <span>Loading library...</span>
    </div>

    <div id="books-container" class="books-grid"></div>

    <div id="empty-state" class="empty-state" style="display: none;">
      <span class="empty-icon">📭</span>
      <p>No audiobooks found</p>
    </div>
  </main>

  <script src="library.js"></script>
</body>
</html>
